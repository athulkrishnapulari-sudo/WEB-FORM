<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>

<body>
    <main>
        <form action="" id="form">
            <div id="name" class="field">
                <label for="Name">Name</label>
                <input type="text" id="Name" name="Name">
            </div>
            <div id="name" class="field">
                <label for="Email">Email</label>
                <input type="email" id="Email" name="Email">
            </div>
            <div id="name" class="field">
                <label for="Subject">Subject</label>
                <textarea id="Subject" name="Subject" rows="4"></textarea>
            </div>
            <div id="fileInputArea" class="field">
                <input class="file-input" id="file" type="file" placeholder="Drop Your Files Here">
            </div>
            <div id="hidden">
                <input type="text" id="filetype" name="FileType" hidden>
                <input type="text" id="filename" name="FileName" hidden>
                <input type="text" id="filedata" name="FileData" hidden>
            </div>
            <button type="submit">Submit</button>
        </form>
    </main>
</body>

</html>
